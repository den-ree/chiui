name: Publish DocC

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-docs:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "latest-stable"

      - name: Build DocC archive
        run: |
          xcodebuild docbuild \
            -scheme Chiui \
            -destination 'generic/platform=iOS' \
            -derivedDataPath .derivedData

      - name: Transform DocC for static hosting
        run: |
          ARCHIVE_PATH="$(find .derivedData -name 'Chiui.doccarchive' | head -n 1)"
          xcrun docc process-archive transform-for-static-hosting "$ARCHIVE_PATH" \
            --output-path docs \
            --hosting-base-path swift-ciua

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy-pages:
    needs: build-docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
